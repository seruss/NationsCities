<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .btn-press {
            transition: transform 0.1s ease;
        }
        .btn-press:active {
            transform: scale(0.96);
        }
        
        /* Modal specific styles from app.css requirements */
        .modal-backdrop {
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background-color: #ffffff;
            border-radius: 1.5rem 1.5rem 0 0;
        }
        .dark .modal-content {
            background-color: #1e293b;
        }
        @media (min-width: 640px) {
            .modal-content {
                border-radius: 1.5rem;
            }

<style>
        body {
            min-height: max(884px, 100dvh);
            font-family: 'Inter', sans-serif;
        }

</head>
<body class="bg-bg-light dark:bg-bg-dark font-body text-on-surface min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-bg-light/80 dark:bg-bg-dark/80 backdrop-blur-md">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-md mx-auto">
<button class="active:scale-95 duration-200 text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-lg text-primary">ROOM: FX-921</h1>
<button class="active:scale-95 duration-200 text-primary">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</header>
<main class="w-full max-w-md px-6 pt-24 pb-32 flex flex-col gap-8">
<!-- Game Settings Section (Host Only) -->
<section class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<h2 class="font-headline font-extrabold text-xl tracking-tight dark:text-white">Game Settings</h2>
<span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Host View</span>
</div>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm btn-press">
<div class="w-12 h-12 rounded-2xl bg-tertiary-container/20 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-tertiary" data-icon="category">category</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-wider text-on-surface-variant dark:text-slate-400 mb-1">Categories</span>
<span class="font-headline text-xs font-bold text-primary">8 Active</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm btn-press">
<div class="w-12 h-12 rounded-2xl bg-secondary-container/20 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-secondary" data-icon="refresh">refresh</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-wider text-on-surface-variant dark:text-slate-400 mb-1">Rounds</span>
<span class="font-headline text-xs font-bold text-primary">5 Rounds</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border-2 border-primary/5 btn-press">
<div class="w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary" data-icon="font_download">font_download</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-wider text-on-surface-variant dark:text-slate-400 mb-1">Litery</span>
<span class="font-headline text-xs font-bold text-primary">Wszystkie</span>
</button>
</div>
</section>
<!-- Player List Section -->
<section class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<h2 class="font-headline font-extrabold text-xl tracking-tight dark:text-white">Players</h2>
<span class="text-on-surface-variant dark:text-slate-400 font-label text-sm font-semibold">4 / 12</span>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between p-4 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Avatar" class="w-12 h-12 rounded-full border-2 border-primary/10" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgKUTu1Im5WStPBOcszjNZdQ3Itansv4I-LnP7DIWMSPzO7LlxzWv8ZWhsjEfDAnbB5m0x26JmBU2Z1AqWv_KbBlRzfdohAqVL3A9VhFq52lEkyJCsJFanvUkBCXpR0dIGRQow4t05sAH53ybIM4E9F9hm8NwzWyku6f_UH0SBXlpM8JzoGPKZFcVtOZCaOfgGcWPLKqjTkCW5n1sYO2WZPjvqfPGL5ezmpzAnBVewKL3UpM3H1qUT0rHd03gZayvdLtmynUE3NFs5"/>
<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-surface-light dark:border-surface-dark"></div>
</div>
<div>
<p class="font-headline font-bold text-on-surface dark:text-white">CaptainFelix</p>
<p class="font-label text-[11px] text-primary font-bold uppercase tracking-widest">Host</p>
</div>
</div>
<span class="bg-green-500/10 text-green-600 font-bold text-[10px] px-3 py-1 rounded-full uppercase">Ready</span>
</div>
</div>
</section>
<!-- Chat Window -->
<section class="flex flex-col gap-4">
<div class="flex items-center gap-2">
<h2 class="font-headline font-extrabold text-xl tracking-tight dark:text-white">Chat</h2>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-sm min-h-[160px] flex flex-col justify-end gap-3">
<div class="flex flex-col gap-2 overflow-y-auto max-h-[120px] hide-scrollbar">
<div class="flex gap-2">
<span class="font-headline text-xs font-bold text-primary">UrbanSara:</span>
<span class="font-body text-xs text-on-surface-variant dark:text-slate-400">Are we starting soon? 🚀</span>
</div>
</div>
<div class="relative">
<input class="w-full bg-bg-light dark:bg-bg-dark border-none rounded-xl py-3 px-4 pr-12 text-sm font-medium focus:ring-2 focus:ring-primary/20 dark:text-white" placeholder="Type a message..." type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center btn-press">
<span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
</button>
</div>
</div>
</section>

<!-- Footer Action -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-4 bg-gradient-to-t from-bg-light dark:from-bg-dark via-bg-light dark:via-bg-dark to-transparent z-40">
<button class="w-full max-w-md mx-auto h-16 rounded-2xl bg-primary text-on-primary font-headline font-extrabold text-lg tracking-tight shadow-lg flex items-center justify-center gap-3 btn-press">
        Rozpocznij grę
        <span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
</button>

</div>
</div>

<div class="p-6 overflow-y-auto hide-scrollbar bg-surface-light dark:bg-surface-dark">
<div class="grid grid-cols-5 gap-3">
<!-- Selected Letter -->

<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">B</button>

<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">D</button>

<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">M</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">N</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-bg-light dark:bg-bg-dark text-slate-400 dark:text-slate-600 font-headline font-bold text-xl btn-press">Ń</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">O</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-bg-light dark:bg-bg-dark text-slate-400 dark:text-slate-600 font-headline font-bold text-xl btn-press">Ó</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">P</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">R</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">S</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-bg-light dark:bg-bg-dark text-slate-400 dark:text-slate-600 font-headline font-bold text-xl btn-press">Ś</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">T</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">U</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">W</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-bg-light dark:bg-bg-dark text-slate-400 dark:text-slate-600 font-headline font-bold text-xl btn-press">X</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">Y</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary font-headline font-bold text-xl shadow-md btn-press">Z</button>
</div>
</div>
<!-- Modal Footer -->
<div class="p-6 bg-surface-light dark:bg-surface-dark border-t border-bg-light dark:border-bg-dark">
<button class="w-full h-14 rounded-2xl bg-primary text-on-primary font-headline font-bold text-lg btn-press shadow-lg shadow-primary/20">
                Zapisz
            </button>
</div>
</div>
</div>
